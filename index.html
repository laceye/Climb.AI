<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climb.ai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        body {
            width: 100%;
            height: 100vh;
            background-color: #00AA00;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }
        
        header {
            text-align: center;
        }
        
        h1 {
            font-size: 4rem;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        #counter {
            font-size: 2rem;
            color: white;
            font-family: Arial, sans-serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: white;
            color: #00AA00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Climb.ai</h1>
    </header>
    
    <div id="counter">Count: <span id="count">0</span></div>
    
    <button onclick="incrementCount()">Increment</button>
    
    <script>
        let count = 0;
        
        function incrementCount() {
            count++;
            document.getElementById('count').innerText = count;
        }
    </script>
</body>
</html>
